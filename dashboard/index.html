<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Digital Attendance System</title>
  <meta name="description" content="Smart Digital Attendance Management System with facial recognition">
  <link rel="stylesheet" href="css/style.css">
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');</script>
</head>

<body>

  <div class="login-container">
    <div class="login-card">

      <div class="logo">
        <div class="logo-icon">📷</div>
        <h1>Digital Attendance</h1>
        <p>Smart Biometric Attendance System</p>
      </div>

      <form id="loginForm" onsubmit="return false;">

        <div class="form-group">
          <label for="user_id">User ID</label>
          <input type="text" id="user_id" class="form-input" placeholder="Enter your ID" autocomplete="username"
            required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Enter your password"
            autocomplete="current-password" required>
        </div>

        <p id="error" class="error-text"></p>

        <button type="submit" id="loginBtn" class="btn btn-primary btn-full" onclick="login()">
          Sign In
        </button>

      </form>

      <p class="text-center mt-4 text-muted" style="font-size: 0.75rem;">
        Face Recognition Powered Attendance
      </p>

    </div>
  </div>

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/app.js"></script>
  <script src="js/login.js"></script>

</body>

</html>
