<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AttendX — Student Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>

<main class="main">
  <div class="topbar">
    <span class="topbar-title" id="page-title">Overview</span>
    <div class="topbar-right">
      <span class="live-dot">Live</span>
      <span id="clock" style="font-family:var(--mono);font-size:12px;color:var(--muted)"></span>
    </div>
  </div>

  <div class="page-content">

    <!-- OVERVIEW -->
    <div id="section-overview">
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card blue"> <div class="stat-label">Overall Attendance</div><div class="stat-value skeleton" style="width:70px;height:32px"></div></div>
        <div class="stat-card green"><div class="stat-label">Classes Attended</div> <div class="stat-value skeleton" style="width:50px;height:32px"></div></div>
        <div class="stat-card amber"><div class="stat-label">Total Lectures</div>   <div class="stat-value skeleton" style="width:50px;height:32px"></div></div>
        <div class="stat-card red">  <div class="stat-label">Subjects at Risk</div><div class="stat-value skeleton" style="width:40px;height:32px"></div></div>
      </div>

      <div class="two-col">
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">Subject-wise Attendance</span>
            <span id="alert-badge"></span>
          </div>
          <div class="panel-body" id="subject-list">
            <div class="empty-state"><p>Loading subjects…</p></div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header"><span class="panel-title">Recent Activity</span></div>
          <div class="panel-body" id="recent-activity">
            <div class="empty-state"><div class="icon">📋</div><p>Loading…</p></div>
          </div>
        </div>
      </div>
    </div>

    <!-- HISTORY -->
    <div id="section-history" style="display:none">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Attendance History</span>
          <select id="course-filter" class="btn btn-ghost" style="font-size:12px;padding:6px 12px" onchange="loadHistory()">
            <option value="">All Subjects</option>
          </select>
        </div>
        <div style="overflow-x:auto">
          <table class="data-table">
            <thead><tr><th>Date</th><th>Time</th><th>Subject</th><th>Room</th><th>Source</th></tr></thead>
            <tbody id="history-body">
              <tr><td colspan="5"><div class="empty-state"><p>Loading…</p></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</main>

<script src="js/api.js"></script>
<script>
if (!requireAuth('student')) throw new Error('redirect');
const user = getUser();

initSidebar('student', user.name, user.id, [
  { icon: '◉', label: 'Overview', active: true,  onclick: "showSection('overview',event)" },
  { icon: '📋', label: 'History', active: false, onclick: "showSection('history',event)" },
]);

startClock('clock');

function showSection(name, e) {
  ['overview','history'].forEach(s =>
    document.getElementById('section-'+s).style.display = s===name ? '' : 'none'
  );
  document.getElementById('page-title').textContent =
    name.charAt(0).toUpperCase() + name.slice(1);
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (e && e.target) e.target.closest('.nav-item').classList.add('active');
  if (name === 'history') loadHistory();
}

async function loadDashboard() {
  try {
    const d = await api.get('/analytics/student/' + user.id);
    renderStats(d);
    renderSubjects(d.subjects || []);
    await loadRecentActivity();
    await populateCourseFilter(d.subjects || []);
  } catch(e) {
    toast('Failed to load: ' + e.message, 'error');
  }
}

function renderStats(d) {
  const atRisk = (d.subjects || []).filter(s => s.status !== 'good').length;
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card blue">
      <div class="stat-label">Overall Attendance</div>
      <div class="stat-value">${d.overall_percentage}%</div>
      <div class="stat-sub">${d.alert ? '⚠ Below threshold' : '✓ On track'}</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Classes Attended</div>
      <div class="stat-value">${d.total_attended}</div>
      <div class="stat-sub">of ${d.total_lectures} total</div>
    </div>
    <div class="stat-card amber">
      <div class="stat-label">Total Lectures</div>
      <div class="stat-value">${d.total_lectures}</div>
      <div class="stat-sub">This semester</div>
    </div>
    <div class="stat-card ${atRisk > 0 ? 'red' : 'green'}">
      <div class="stat-label">Subjects at Risk</div>
      <div class="stat-value">${atRisk}</div>
      <div class="stat-sub">Below 75%</div>
    </div>
  `;
}

function renderSubjects(subjects) {
  if (!subjects.length) {
    document.getElementById('subject-list').innerHTML =
      '<div class="empty-state"><div class="icon">📚</div><p>No subjects found</p></div>';
    return;
  }

  document.getElementById('subject-list').innerHTML = subjects.map(s => `
    <div class="progress-row">
      <span class="progress-label" title="${s.course_name}">${s.course_name}</span>
      <div class="progress-track">
        <div class="progress-fill ${pctClass(s.percentage)}" style="width:${Math.min(s.percentage,100)}%"></div>
      </div>
      <span class="progress-pct ${pctClass(s.percentage)}">${s.percentage}%</span>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:-6px;margin-bottom:12px">
      <span style="font-size:11px;color:var(--muted);font-family:var(--mono)">${s.attended}/${s.total_lectures}</span>
    </div>
  `).join('');

  const warnings = subjects.filter(s => s.status !== 'good');
  document.getElementById('alert-badge').innerHTML = warnings.length
    ? `<span class="badge danger">⚠ ${warnings.length} at risk</span>`
    : '';
}

async function loadRecentActivity() {
  try {
    const history = await api.get('/analytics/student/' + user.id + '/history?limit=8');
    if (!history.length) {
      document.getElementById('recent-activity').innerHTML =
        '<div class="empty-state"><div class="icon">📋</div><p>No attendance recorded yet</p></div>';
      return;
    }
    document.getElementById('recent-activity').innerHTML = history.map(h => `
      <div style="display:flex;justify-content:space-between;align-items:center;
                  padding:10px 0;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-size:13px;font-weight:500;color:var(--text)">${h.course_name}</div>
          <div style="font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px">${formatDate(h.timestamp)}</div>
        </div>
        <div style="text-align:right">
          <span class="badge info" style="font-family:var(--mono)">${formatTime(h.timestamp)}</span>
          <div style="font-size:10px;color:var(--muted);margin-top:3px">${h.classroom_id || ''}</div>
        </div>
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('recent-activity').innerHTML =
      '<div class="empty-state"><p>No history available</p></div>';
  }
}

async function populateCourseFilter(subjects) {
  const sel = document.getElementById('course-filter');
  subjects.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.course_id;
    opt.textContent = s.course_name;
    sel.appendChild(opt);
  });
}

async function loadHistory() {
  const course = document.getElementById('course-filter').value;
  const url = '/analytics/student/' + user.id + '/history?limit=100' + (course ? '&course_id='+course : '');
  try {
    const history = await api.get(url);
    document.getElementById('history-body').innerHTML = history.length
      ? history.map(h => `<tr>
          <td>${formatDate(h.timestamp)}</td>
          <td style="font-family:var(--mono);font-size:12px">${formatTime(h.timestamp)}</td>
          <td style="font-weight:500">${h.course_name}</td>
          <td style="font-family:var(--mono);font-size:11px;color:var(--muted)">${h.classroom_id || '–'}</td>
          <td><span class="badge ${h.source==='face_recognition'?'good':'info'}">
            ${h.source==='face_recognition'?'👁 Face':'✏ Manual'}
          </span></td>
        </tr>`).join('')
      : '<tr><td colspan="5"><div class="empty-state"><p>No records found</p></div></td></tr>';
  } catch(e) { toast('Failed to load history', 'error'); }
}

loadDashboard();
setInterval(loadDashboard, 30000);
</script>
</body>
</html>
